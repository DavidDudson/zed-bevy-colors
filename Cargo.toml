[workspace]
members = ["crates/bevy-color-lsp", "crates/zed-extension"]
default-members = ["crates/bevy-color-lsp"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/ddudson/zed-bevy-color"
authors = ["David Dudson <davidjohndudson@gmail.com>"]

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
