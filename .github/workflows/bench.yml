name: Bench

on:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  pull-requests: write

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Compile benches
        run: cargo bench -p bevy-color-lsp --no-run

      - name: Bench base branch
        if: github.event_name == 'pull_request'
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}
          cargo bench -p bevy-color-lsp --bench pipeline -- \
            --quick --warm-up-time 1 --measurement-time 3 --save-baseline base

      - name: Bench head
        run: |
          git checkout ${{ github.event.pull_request.head.sha || github.sha }}
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            cargo bench -p bevy-color-lsp --bench pipeline -- \
              --quick --warm-up-time 1 --measurement-time 3 --baseline base \
              | tee bench-output.txt
          else
            cargo bench -p bevy-color-lsp --bench pipeline -- \
              --quick --warm-up-time 1 --measurement-time 3 \
              --output-format bencher \
              | tee bench-output.txt
          fi

      - name: Format PR comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        run: |
          # Keep only paragraphs where criterion reported a real
          # change ("improved" or "regressed"). Drop "No change in
          # performance detected." noise.
          changed=$(awk 'BEGIN{RS=""; ORS="\n\n"} /Performance has (improved|regressed)/' bench-output.txt)
          if [ -z "$changed" ]; then
            {
              echo '## Bench diff (criterion `--quick`, head vs base)'
              echo
              echo 'No performance changes detected.'
            } > bench-comment.md
          else
            {
              echo '## Bench diff (criterion `--quick`, head vs base)'
              echo
              echo 'Only benches with a significant change are shown.'
              echo
              echo '<details open><summary>Changed benches</summary>'
              echo
              echo '```'
              printf '%s\n' "$changed"
              echo '```'
              echo
              echo '</details>'
            } > bench-comment.md
          fi

      - name: Post comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: bench-compare
          path: bench-comment.md

      - uses: actions/upload-artifact@v6
        with:
          name: bench-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            target/criterion/**
            bench-output.txt
          retention-days: 30
